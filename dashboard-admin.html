<!DOCTYPE html>
<html lang="es-GT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel Admin · Campeón del Abarrote</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Semi+Condensed:wght@600;700;800&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --aje-green:#008751; --aje-green-d:#016b41; --aje-green-l:#1aa56a; --green-soft:#e6f4ee;
    --yellow:#FFCC00; --yellow-d:#e6b800;
    --navy:#0c1c40; --navy-2:#14264f; --navy-3:#22335c;
    --orange:#f97316; --red:#e2231a;
    --ink:#0f1b33; --slate:#647089; --slate-l:#8a94a8;
    --bg:#f1f4f8; --card:#ffffff; --line:#e6eaf0; --line-d:#d8deea;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Barlow',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
  .disp{font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.01em;line-height:.95}
  .cond{font-family:'Barlow Semi Condensed',sans-serif}
  button{font-family:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#c5cdda;border-radius:6px;border:2px solid var(--bg)}
  #root{min-height:100vh}
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="lib/data.js"></script>
  <script src="admin-views.js"></script>
  <script src="admin-app.js"></script>
</body>
</html>
