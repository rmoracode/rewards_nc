<!DOCTYPE html>
<html lang="es-GT">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Vendedor · Campeón del Abarrote</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&family=Barlow+Semi+Condensed:wght@600;700;800&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --aje-green:#008751; --aje-green-d:#016b41; --aje-green-l:#1aa56a;
    --yellow:#FFCC00; --yellow-d:#e6b800;
    --navy:#0c1c40; --navy-2:#14264f; --navy-3:#1d3463;
    --orange:#f97316; --red:#e2231a;
    --ink:#0f172a; --slate:#64748b; --line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Barlow',system-ui,sans-serif;
    background:#dfe4ea;
    background-image:radial-gradient(circle at 20% 10%, #eef1f5, #dbe0e7 60%);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px; color:var(--ink);
  }
  .disp{font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.01em;line-height:.95}
  .cond{font-family:'Barlow Semi Condensed',sans-serif}

  /* ---- Phone shell ---- */
  .phone{
    width:390px; height:844px; background:#000; border-radius:46px;
    padding:11px; box-shadow:0 40px 90px -20px rgba(12,28,64,.55), 0 0 0 2px #1a1a1a, inset 0 0 0 11px #0a0a0a;
    position:relative; flex:0 0 auto;
  }
  .screen{
    width:100%; height:100%; border-radius:36px; overflow:hidden;
    background:var(--navy); position:relative; display:flex; flex-direction:column;
  }
  /* iOS status bar */
  .statusbar{
    height:44px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:0 26px 0 30px; color:#fff; font-weight:600; font-size:14px; background:#0a163a; position:relative; z-index:5;
  }
  .statusbar .dots{display:flex;gap:5px;align-items:center}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:118px;height:30px;background:#000;border-radius:18px;z-index:20}
  /* Telegram mini-app header */
  .tg-head{
    flex:0 0 auto; height:50px; background:#0a163a; color:#fff;
    display:flex; align-items:center; gap:10px; padding:0 14px; border-bottom:1px solid var(--line); position:relative; z-index:5;
  }
  .tg-head .tgline{display:flex;flex-direction:column;line-height:1.1;min-width:0}
  .tg-head .tgname{font-weight:700;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tg-head .tgsub{font-size:11px;color:#7fa8d8}
  .tg-ico{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:#cdddf2}
  .tg-ico:hover{background:rgba(255,255,255,.08)}

  .app{flex:1 1 auto;overflow-y:auto;overflow-x:hidden;position:relative}
  .app::-webkit-scrollbar{width:0}

  /* bottom nav */
  .tabbar{flex:0 0 auto}

  .hidden{display:none}
  @media (max-width:430px){
    body{padding:0;background:var(--navy)}
    .phone{width:100vw;height:100vh;border-radius:0;padding:0;box-shadow:none}
    .screen{border-radius:0}
    .notch{display:none}
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="notch"></div>
    <div class="screen">
      <div class="statusbar">
        <span>9:41</span>
        <span class="dots">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="1" fill="#fff"/><rect x="5" y="4" width="3" height="8" rx="1" fill="#fff"/><rect x="10" y="2" width="3" height="10" rx="1" fill="#fff"/><rect x="15" y="0" width="3" height="12" rx="1" fill="#fff"/></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.5c2.3 0 4.4.9 6 2.4l-1.4 1.4A6.6 6.6 0 0 0 8.5 5.4 6.6 6.6 0 0 0 3.9 6.3L2.5 4.9A8.6 8.6 0 0 1 8.5 2.5Z" fill="#fff"/><circle cx="8.5" cy="9.5" r="1.6" fill="#fff"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="21" height="11" rx="3" stroke="#fff" stroke-opacity=".5" stroke-width="1.2"/><rect x="2.6" y="2.6" width="16" height="7.8" rx="1.6" fill="#fff"/><rect x="23.4" y="4.5" width="1.6" height="4" rx="1" fill="#fff" fill-opacity=".6"/></svg>
        </span>
      </div>
      <div class="tg-head">
        <div class="tg-ico" title="Atrás">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="tgline">
          <span class="tgname">Campeón del Abarrote</span>
          <span class="tgsub">bot · mini app</span>
        </div>
        <div style="flex:1"></div>
        <div class="tg-ico" title="Menú">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="5" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="19" cy="12" r="1.8" fill="currentColor"/></svg>
        </div>
        <div class="tg-ico" title="Cerrar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
      </div>
      <div id="root" class="app"></div>
    </div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="lib/data.js"></script>
  <script type="text/babel" src="vendedor-views.jsx"></script>
  <script type="text/babel" src="vendedor-app.jsx"></script>
</body>
</html>
